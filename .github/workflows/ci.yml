name: Main CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} - Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm lint

      - name: Install ShellCheck (Ubuntu only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          echo "Checking shell scripts with ShellCheck..."

          # ShellCheck will use .shellcheckrc automatically
          shellcheck_failed=0

          # Find and check all .sh files (excluding node_modules)
          while IFS= read -r file; do
            echo "Checking $file"
            if ! shellcheck --severity=warning "$file"; then
              shellcheck_failed=1
            fi
          done < <(find . -name "*.sh" -not -path "*/node_modules/*" -not -path "*/.git/*")

          # Exit with error if any script failed
          if [ $shellcheck_failed -eq 1 ]; then
            echo "ShellCheck found issues in shell scripts"
            exit 1
          fi

      - name: Build CLI
        run: pnpm build

      - name: Run unit tests
        run: pnpm test

      - name: Run shell tests (Vitest + execa)
        run: pnpm test:shell

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm security:audit
        continue-on-error: true

  # Test CLI installation
  install-test:
    name: Test CLI Installation on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Build package
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Pack package
        run: pnpm pack

      - name: Install package globally (Unix)
        if: runner.os != 'Windows'
        run: npm install -g agentsync-*.tgz

      - name: Install package globally (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path . -Filter "agentsync-*.tgz" | Select-Object -First 1
          if (-not $package) {
            throw "Packed agentsync tarball not found"
          }
          npm install -g $package.FullName

      - name: Test installed CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          agentsync --version
          agentsync --help
          agentsync sync --help
          agentsync config --help

      - name: Test installed CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          agentsync --version
          agentsync --help
          agentsync sync --help
          agentsync config --help

      - name: Verify CLI is executable (Unix)
        if: runner.os != 'Windows'
        run: |
          which agentsync
          ls -la $(which agentsync)

      - name: Verify CLI is executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          where.exe agentsync
          Get-Command agentsync
