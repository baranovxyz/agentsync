name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch/minor/none). Use 'none' for major releases — bump package.json manually before dispatching."
        required: true
        type: choice
        options:
          - patch
          - minor
          - none
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Bump version
        if: ${{ inputs.bump != 'none' }}
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Commit and push version bump
        if: ${{ inputs.bump != 'none' && !inputs.dry-run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v$VERSION"
          git push

      - name: Get version and dist-tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *"-beta."* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Branch guard
        if: ${{ github.ref_name != 'main' }}
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$PKG_VERSION" != *-* ]]; then
            echo "::error::Stable publishing is only allowed from the main branch"
            exit 1
          fi
          echo "Prerelease $PKG_VERSION may publish from ${{ github.ref_name }}"

      - name: Version guard
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "agentsync@$PKG_VERSION" version 2>/dev/null; then
            echo "::error::Version $PKG_VERSION is already published to npm"
            exit 1
          fi

      - name: Publish (dry run)
        if: ${{ inputs.dry-run }}
        env:
          DIST_TAG: ${{ steps.version.outputs.tag }}
        run: npm publish --provenance --access public --ignore-scripts --tag "$DIST_TAG" --dry-run

      - name: Publish
        if: ${{ !inputs.dry-run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ steps.version.outputs.tag }}
        run: npm publish --provenance --access public --ignore-scripts --tag "$DIST_TAG"

  tag-and-release:
    needs: publish
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Create and push tag
        env:
          TAG: v${{ needs.publish.outputs.version }}
        run: |
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.publish.outputs.version }}
        run: |
          PRERELEASE=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" --generate-notes --title "$TAG" $PRERELEASE || echo "Release already exists for $TAG, skipping"
